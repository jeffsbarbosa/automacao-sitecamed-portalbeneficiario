name: Testes Automatizados - Site Camed e Portal de Serviços Área Logada

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Testar acesso ao site
        shell: powershell
        run: |
          try {
            Invoke-WebRequest https://apps.camed.com.br/CamedSaudeServicos -UseBasicParsing
          } catch {
            Write-Host "Falha no acesso ao site"
          }

      - name: Rodar testes automatizados
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          headed: true
          spec: | 
            cypress/e2e/TESTES_HOMEPAGE/**/*.cy.js          
            cypress/e2e/TESTES_PORTAL_AREA_NAO_LOGADA/**/*.cy.js
            cypress/e2e/TESTES_PERFIL_ASSOCIADO/**/*.cy.js
          wait-on: ""

      - name: Gerar relatório HTML
        if: always()
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "cypress/reports" -Filter "*.json"

          if (-not $files) {
            Write-Error "Nenhum JSON encontrado!"
            exit 1
          }

          npx marge $files.FullName --reportDir cypress/reports --reportFilename report

      - name: Upload dos relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cypress
          path: |
            cypress/reports
            cypress/screenshots
            cypress/videos

  gerar-relatorio-final:
    needs: cypress-run
    if: always()
    runs-on: self-hosted

    env:
      TOTAL: 0
      PASSED: 0
      FAILED: 0
      SUCCESS_RATE: 0
      STATUS_LEVEL: ""
      FAIL_LIST: ""
      TABLE_HOMEPAGE: ""
      TABLE_PORTAL: ""
      TABLE_PERFIL: ""
      MODULE_HOME_RATE: ""
      MODULE_PORTAL_RATE: ""
      MODULE_PERFIL_RATE: ""

    steps:
      - name: Baixar relatórios
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Consolidar resultados
        shell: powershell
        run: |
          $files = Get-ChildItem "all-reports" -Recurse -Filter mochawesome*.json

          $TOTAL=0;$PASSED=0;$FAILED=0

          foreach ($file in $files) {
            $json = Get-Content $file.FullName -Raw | ConvertFrom-Json
            $TOTAL += $json.stats.tests
            $PASSED += $json.stats.passes
            $FAILED += $json.stats.failures
          }

          echo "TOTAL=$TOTAL" >> $env:GITHUB_ENV
          echo "PASSED=$PASSED" >> $env:GITHUB_ENV
          echo "FAILED=$FAILED" >> $env:GITHUB_ENV

      - name: Calcular métricas
        shell: powershell
        run: |
          $rate = if ($env:TOTAL -eq 0) {0} else {[math]::Round(($env:PASSED/$env:TOTAL)*100,2)}

          if ($env:FAILED -eq 0) {
            $status="SUCESSO"
          } elseif ($env:FAILED -le 2) {
            $status="ATENÇÃO"
          } else {
            $status="CRÍTICO"
          }

          echo "SUCCESS_RATE=$rate" >> $env:GITHUB_ENV
          echo "STATUS_LEVEL=$status" >> $env:GITHUB_ENV

      - name: Montar relatório premium
        shell: powershell
        run: |
          $home=@();$portal=@();$perfil=@();$fail=@()

          $hT=0;$hP=0;$pT=0;$pP=0;$pfT=0;$pfP=0

          function Row($suite,$test){
            $status = if ($test.state -eq "failed") {"<span style='color:#dc3545;'>🔴</span>"} else {"<span style='color:#28a745;'>🟢</span>"}
            $time=[math]::Round($test.duration/1000,2)
            $error = if ($test.state -eq "failed"){($test.err.message -split "`n")[0]} else {"-"}

            if ($test.state -eq "failed"){ $fail += "<li>$($test.title)</li>" }

            return "<tr>
            <td>$suite</td>
            <td>$($test.title)</td>
            <td>$status</td>
            <td>${time}s</td>
            <td>$error</td>
            </tr>"
          }

          $files=Get-ChildItem "all-reports" -Recurse -Filter mochawesome*.json

          foreach ($f in $files){
            $json=Get-Content $f.FullName -Raw|ConvertFrom-Json

            foreach ($r in $json.results){
              foreach ($s in $r.suites){
                foreach ($t in $s.tests){

                  if ($f.FullName -like "*HOMEPAGE*"){
                    $home+=Row $s.title $t;$hT++;if($t.state -ne "failed"){$hP++}
                  }
                  elseif ($f.FullName -like "*PORTAL*"){
                    $portal+=Row $s.title $t;$pT++;if($t.state -ne "failed"){$pP++}
                  }
                  else{
                    $perfil+=Row $s.title $t;$pfT++;if($t.state -ne "failed"){$pfP++}
                  }

                }
              }
            }
          }

          function Rate($p,$t){ if($t -eq 0){0}else{[math]::Round(($p/$t)*100,2)} }

          echo "MODULE_HOME_RATE=$(Rate $hP $hT)" >> $env:GITHUB_ENV
          echo "MODULE_PORTAL_RATE=$(Rate $pP $pT)" >> $env:GITHUB_ENV
          echo "MODULE_PERFIL_RATE=$(Rate $pfP $pfT)" >> $env:GITHUB_ENV

          function Table($rows){
            "<table style='border-collapse:collapse;width:100%;font-size:13px'>
            <tr style='background:#f1f3f5'>
            <th>Suite</th><th>Cenário</th><th>Status</th><th>Tempo</th><th>Erro</th>
            </tr>$($rows -join '')</table>"
          }

          echo "TABLE_HOMEPAGE=$(Table $home)" >> $env:GITHUB_ENV
          echo "TABLE_PORTAL=$(Table $portal)" >> $env:GITHUB_ENV
          echo "TABLE_PERFIL=$(Table $perfil)" >> $env:GITHUB_ENV

          if($fail.Count -eq 0){
            echo "FAIL_LIST=<p style='color:green'>Nenhuma falha</p>" >> $env:GITHUB_ENV
          } else {
            echo "FAIL_LIST=<ul>$($fail -join '')</ul>" >> $env:GITHUB_ENV
          }

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: correio.camed.com.br
          server_port: 587
          secure: false
          ignore_cert: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Relatório Premium de Testes"
          to: ${{ secrets.EMAIL_TO }}
          cc: ${{ secrets.EMAIL_CC }}
          from: Jefferson Barbosa <${{ secrets.EMAIL_USER }}>

          html_body: |
            <h2>📊 Relatório de Execução</h2>

            <p><b>Total:</b> ${{ env.TOTAL }}</p>
            <p><b>Sucesso:</b> ${{ env.PASSED }}</p>
            <p><b>Falhas:</b> ${{ env.FAILED }}</p>
            <p><b>Taxa:</b> ${{ env.SUCCESS_RATE }}%</p>

            <h3>Status: ${{ env.STATUS_LEVEL }}</h3>

            <h3>❌ Falhas</h3>
            ${{ env.FAIL_LIST }}

            <h3>🏠 Homepage (${{ env.MODULE_HOME_RATE }}%)</h3>
            ${{ env.TABLE_HOMEPAGE }}

            <h3>🌐 Portal (${{ env.MODULE_PORTAL_RATE }}%)</h3>
            ${{ env.TABLE_PORTAL }}

            <h3>🔐 Perfil (${{ env.MODULE_PERFIL_RATE }}%)</h3>
            ${{ env.TABLE_PERFIL }}