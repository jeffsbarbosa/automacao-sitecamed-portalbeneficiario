name: Testes Cypress Diário - Site Camed / Portal do Beneficiário Área Logada

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:

  # 🔥 JOB 1 - EXECUÇÃO EM PARALELO
  cypress-run:
    runs-on: self-hosted

  #  strategy:
   #   fail-fast: false
    #  matrix:
     #   spec:
      #    - cypress/e2e/TESTES_HOMEPAGE
       #   - cypress/e2e/TESTES_PERFIL_ASSOCIADO
        #  - cypress/e2e/TESTES_PORTAL_AREA_NAO_LOGADA

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Cache Cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Testar acesso ao site
        run: curl -I https://apps.camed.com.br/CamedSaudeServicos || true

      - name: Rodar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/TESTES_PERFIL_ASSOCIADO/TESTES_DISPONIBILIDADE_USABILIDADE/MENU_INTERCAMBIO/DISPONIBILIDADE_ITENS.cy.js
          wait-on: ''

      - name: Upload dos relatórios (parcial)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-${{ matrix.spec }}
          path: |
            cypress/reports
            cypress/screenshots

  # 🧠 JOB 2 - CONSOLIDAÇÃO + EMAIL
  gerar-relatorio-final:
    needs: cypress-run
    runs-on: self-hosted

    env:
      TOTAL: 0
      PASSED: 0
      FAILED: 0
      SUCCESS_RATE: 0
      STATUS_LEVEL: ""
      FAIL_LIST: ""

    steps:
      - name: Baixar todos os relatórios
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Consolidar resultados
        run: |
          TOTAL=$(grep -o '"tests":[0-9]*' all-reports/**/*.json | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
          PASSED=$(grep -o '"passes":[0-9]*' all-reports/**/*.json | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
          FAILED=$(grep -o '"failures":[0-9]*' all-reports/**/*.json | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV

      - name: Calcular métricas avançadas
        run: |
          if [ "$TOTAL" -eq "0" ]; then
            SUCCESS_RATE=0
          else
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
          fi

          if [ "$FAILED" -eq "0" ]; then
            STATUS_LEVEL="SUCESSO TOTAL ✅"
          elif [ "$FAILED" -le "2" ]; then
            STATUS_LEVEL="ATENÇÃO ⚠️"
          else
            STATUS_LEVEL="CRÍTICO 🚨"
          fi

          echo "SUCCESS_RATE=$SUCCESS_RATE" >> $GITHUB_ENV
          echo "STATUS_LEVEL=$STATUS_LEVEL" >> $GITHUB_ENV

      - name: Listar testes que falharam
        run: |
          FAIL_LIST=$(cat all-reports/**/*.json | jq -r '
            .results[]?.suites[]?.tests[]? 
            | select(.fail == true) 
            | .fullTitle
          ')

          if [ -z "$FAIL_LIST" ]; then
            FAIL_LIST="Nenhum teste falhou 🎉"
          fi

          echo "FAIL_LIST<<EOF" >> $GITHUB_ENV
          echo "$FAIL_LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Enviar relatório por email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Resultado Cypress - ${{ env.STATUS_LEVEL }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USER }}
          body: |
            🚀 Execução automática dos testes Cypress finalizada!

            ==================================================
            📊 RESUMO EXECUTIVO
            ==================================================

            ✔️ Total de testes executados: ${{ env.TOTAL }}
            ✅ Testes aprovados: ${{ env.PASSED }}
            ❌ Testes com falha: ${{ env.FAILED }}

            📈 Taxa de sucesso: ${{ env.SUCCESS_RATE }}%
            🚨 Nível da execução: ${{ env.STATUS_LEVEL }}

            ==================================================
            ❌ TESTES QUE FALHARAM
            ==================================================

            ${{ env.FAIL_LIST }}

            ==================================================
            📌 DETALHES DA EXECUÇÃO
            ==================================================

            🗂 Repositório: ${{ github.repository }}
            🔢 Execução: #${{ github.run_number }}
            🌿 Branch: ${{ github.ref_name }}

            ==================================================
            📎 EVIDÊNCIAS
            ==================================================

            ✔️ Relatório completo em HTML
            ✔️ Screenshots automáticos das falhas

            ==================================================
            🤖 Jefferson Barbosa - Automação QA
          attachments: |
            all-reports/**/*.html
            all-reports/**/*.png