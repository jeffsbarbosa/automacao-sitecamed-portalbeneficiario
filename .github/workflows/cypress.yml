name: Testes Automatizados - Site Camed e Portal de Serviços Área Logada

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Testar acesso ao site
        shell: powershell
        run: |
          try {
            Invoke-WebRequest https://apps.camed.com.br/CamedSaudeServicos -UseBasicParsing
          } catch {
            Write-Host "Falha no acesso ao site"
          }

      - name: Rodar testes automatizados
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          headed: true
          spec: | 
            cypress/e2e/TESTES_HOMEPAGE/**/*.cy.js          
            cypress/e2e/TESTES_PORTAL_AREA_NAO_LOGADA/**/*.cy.js
            cypress/e2e/TESTES_PERFIL_ASSOCIADO/**/*.cy.js

      - name: Gerar relatório HTML
        if: always()
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "cypress/reports" -Filter "*.json" | Select-Object -ExpandProperty FullName

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nenhum arquivo JSON encontrado!"
            exit 1
          }

          npx marge $files --reportDir cypress/reports --reportFilename report

      - name: Upload dos relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cypress
          path: |
            cypress/reports
            cypress/screenshots
            cypress/videos

  gerar-relatorio-final:
    needs: cypress-run
    if: always()
    runs-on: self-hosted

    env:
      TOTAL: 0
      PASSED: 0
      FAILED: 0
      SUCCESS_RATE: 0
      STATUS_LEVEL: ""
      TABLE_HOME: ""
      TABLE_PORTAL: ""
      TABLE_PERFIL: ""
      RATE_HOME: ""
      RATE_PORTAL: ""
      RATE_PERFIL: ""

    steps:
      - name: Ajustar encoding UTF-8
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

      - name: Baixar relatórios
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Consolidar resultados
        shell: powershell
        run: |
          $files = Get-ChildItem "all-reports" -Recurse -Filter mochawesome*.json

          [int]$TOTAL = 0
          [int]$PASSED = 0
          [int]$FAILED = 0

          foreach ($file in $files) {
            $json = Get-Content $file.FullName -Raw | ConvertFrom-Json
            $TOTAL += $json.stats.tests
            $PASSED += $json.stats.passes
            $FAILED += $json.stats.failures
          }

          echo "TOTAL=$TOTAL" >> $env:GITHUB_ENV
          echo "PASSED=$PASSED" >> $env:GITHUB_ENV
          echo "FAILED=$FAILED" >> $env:GITHUB_ENV

      - name: Calcular métricas
        shell: powershell
        run: |
          $rate = if ($env:TOTAL -eq 0) {0} else {[math]::Round(($env:PASSED/$env:TOTAL)*100,2)}
          echo "SUCCESS_RATE=$rate" >> $env:GITHUB_ENV

      - name: Montar tabelas por módulo (via spec)
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Web

          $homeFail=@();$homePass=@()
          $portalFail=@();$portalPass=@()
          $perfilFail=@();$perfilPass=@()

          $hT=0;$hP=0;$pT=0;$pP=0;$pfT=0;$pfP=0

          function Row($suite, $test) {
            $status = if ($test.state -eq "failed") { "FALHA" } else { "SUCESSO" }

            $erro = if ($test.state -eq "failed" -and $test.err.message) {
              ($test.err.message -split "`n")[0]
            } else { "-" }

            $color = if ($status -eq "SUCESSO") { "#2e7d32" } else { "#c62828" }
            $bg = if ($status -eq "SUCESSO") { "#e8f5e9" } else { "#ffebee" }

            return "<tr style='background:$bg'>
            <td>$suite</td>
            <td>$($test.title)</td>
            <td style='color:$color;font-weight:bold'>$status</td>
            <td>$($test.duration) ms</td>
            <td>$erro</td>
            </tr>"
          }

          $files = Get-ChildItem "all-reports" -Recurse -Filter mochawesome*.json

          foreach ($f in $files){
            $json = Get-Content $f.FullName -Raw | ConvertFrom-Json

            foreach ($r in $json.results){

              $filePath = $r.file.ToLower()

              foreach ($s in $r.suites){
                foreach ($t in $s.tests){

                  $row = Row $s.title $t

                  if ($filePath -like "*testes_homepage*"){
                    $hT++
                    if($t.state -eq "failed"){ $homeFail += $row } else { $homePass += $row; $hP++ }
                  }
                  elseif ($filePath -like "*testes_portal_area_nao_logada*"){
                    $pT++
                    if($t.state -eq "failed"){ $portalFail += $row } else { $portalPass += $row; $pP++ }
                  }
                  elseif ($filePath -like "*testes_perfil_associado*"){
                    $pfT++
                    if($t.state -eq "failed"){ $perfilFail += $row } else { $perfilPass += $row; $pfP++ }
                  }

                }
              }
            }
          }

          function Rate($p,$t){ if($t -eq 0){0}else{[math]::Round(($p/$t)*100,2)} }

          echo "RATE_HOME=$(Rate $hP $hT)" >> $env:GITHUB_ENV
          echo "RATE_PORTAL=$(Rate $pP $pT)" >> $env:GITHUB_ENV
          echo "RATE_PERFIL=$(Rate $pfP $pfT)" >> $env:GITHUB_ENV

          function Table($fail,$pass){
            $rows = ($fail + $pass) -join ''
            "<table style='border-collapse:collapse;width:100%;font-size:13px'>
            <tr style='background:#212529;color:#ffffff'>
            <th>Suite</th><th>Cenário</th><th>Status</th><th>Tempo</th><th>Erro</th>
            </tr>$rows</table>"
          }

          "TABLE_HOME<<EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          (Table $homeFail $homePass) | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          "TABLE_PORTAL<<EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          (Table $portalFail $portalPass) | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          "TABLE_PERFIL<<EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          (Table $perfilFail $perfilPass) | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: correio.camed.com.br
          server_port: 587
          secure: false
          ignore_cert: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Testes Automatizados - Site Camed e Portal do Beneficiário"
          to: ${{ secrets.EMAIL_TO }}
          from: Jefferson Barbosa <${{ secrets.EMAIL_USER }}>

          html_body: |
            <meta charset="UTF-8">

            <table style="width:100%;border-collapse:collapse;font-family:Arial">
              <tr style="background:#212529;color:#ffffff">
                <th style="padding:12px;text-align:left">
                  🛡️ Quality Assurance | Site Camed & Área Logada
                </th>
              </tr>
            </table>

            <br>

            <h2>🚀 Execução dos testes automatizados concluída</h2>

            <p>Olá, bom dia! </p> 

            <p>Os testes automatizados do <b>Site Camed</b> e <b>Portal de Serviços Área Logada</b> foram executados. Segue abaixo, resumo da execução:</p>

              <h3>📊 Resumo da execução</h3>

            <table style="width:100%;border-collapse:collapse;text-align:center;font-family:Arial">
              <tr style="background:#f1f1f1;">
                <th>Total</th><th>Aprovados</th><th>Falhas</th><th>Taxa</th>
              </tr>
              <tr>
                <td><b>${{ env.TOTAL }}</b></td>
                <td style="color:#28a745"><b>${{ env.PASSED }}</b></td>
                <td style="color:#dc3545"><b>${{ env.FAILED }}</b></td>
                <td><b>${{ env.SUCCESS_RATE }}%</b></td>
              </tr>
            </table>

            <br>

            <h3>🏠 Homepage (${{ env.RATE_HOME }}%)</h3>
            ${{ env.TABLE_HOME }}

            <br>

            <h3>🌐 Portal Área Não Logada (${{ env.RATE_PORTAL }}%)</h3>
            ${{ env.TABLE_PORTAL }}

            <br>

            <h3>🔐 Perfil Associado (${{ env.RATE_PERFIL }}%)</h3>
            ${{ env.TABLE_PERFIL }}

            <hr>

            <br>
               
            <hr>

            <p>🤖 Automação de Testes</p>

            <hr>

            <br>


            <br>

            <div style="margin-top: 20px;">
            <img src="https://raw.githubusercontent.com/jeffsbarbosa/automacao-sitecamed-portalbeneficiario/refs/heads/main/cypress/assets/assinatura_email1.png"
            alt="Assinatura Jefferson Barbosa"
            style="max-width: 450px; width: 100%;">
            </div>

          attachments: |
            all-reports/report.html