name: Testes Automatizados - Site Camed e Portal de Serviços Área Logada

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Testar acesso ao site
        shell: powershell
        run: |
          try {
            Invoke-WebRequest https://apps.camed.com.br/CamedSaudeServicos -UseBasicParsing
          } catch {
            Write-Host "Falha no acesso ao site"
          }

      - name: Rodar testes automatizados
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          headed: true
          spec: | 
            cypress/e2e/TESTES_HOMEPAGE/**/*.cy.js          
            cypress/e2e/TESTES_PORTAL_AREA_NAO_LOGADA/**/*.cy.js
            cypress/e2e/TESTES_PERFIL_ASSOCIADO/**/*.cy.js
            
           
          wait-on: ""

      - name: Gerar relatório HTML
        if: always()
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "cypress/reports" -Filter "*.json" | Select-Object -ExpandProperty FullName

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nenhum arquivo JSON encontrado em cypress/reports!"
            exit 1
          }

          Write-Host "Arquivos encontrados:"
          $files

          npx marge $files --reportDir cypress/reports --reportFilename report

      - name: Upload dos relatórios (HTML + evidências)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cypress
          path: |
            cypress/reports
            cypress/screenshots
            cypress/videos

  gerar-relatorio-final:
    needs: cypress-run
    if: always()
    runs-on: self-hosted

    env:
      TOTAL: 0
      PASSED: 0
      FAILED: 0
      SUCCESS_RATE: 0
      STATUS_LEVEL: ""
      FAIL_LIST: ""

    steps:
      - name: Ajustar encoding UTF-8 (GLOBAL)
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

      - name: Baixar relatórios do Cypress
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Consolidar resultados
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "all-reports" -Recurse -Filter mochawesome*.json -ErrorAction SilentlyContinue

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nenhum JSON encontrado para consolidação!"
            exit 1
          }

          [int]$TOTAL = 0
          [int]$PASSED = 0
          [int]$FAILED = 0

          foreach ($file in $files) {
            $json = Get-Content $file.FullName -Raw -Encoding UTF8 | ConvertFrom-Json

            if ($json.stats) {
              $TOTAL += [int]$json.stats.tests
              $PASSED += [int]$json.stats.passes
              $FAILED += [int]$json.stats.failures
            }
          }

          echo "TOTAL=$TOTAL" >> $env:GITHUB_ENV
          echo "PASSED=$PASSED" >> $env:GITHUB_ENV
          echo "FAILED=$FAILED" >> $env:GITHUB_ENV

      - name: Calcular métricas
        shell: powershell
        run: |
          if ($env:TOTAL -eq 0) {
            $SUCCESS_RATE = 0
          } else {
            $SUCCESS_RATE = [math]::Round(($env:PASSED / $env:TOTAL) * 100, 2)
          }

          if ($env:FAILED -eq 0) {
            $STATUS_LEVEL = "SUCESSO: Nenhuma falha detectada"
            $STATUS_COLOR = "#28a745"
          }
          elseif ($env:FAILED -le 2) {
            $STATUS_LEVEL = "ATENÇÃO: Falhas pontuais identificadas"
            $STATUS_COLOR = "#ffc107"
          }
          else {
            $STATUS_LEVEL = "CRÍTICO: Falhas relevantes detectadas"
            $STATUS_COLOR = "#dc3545"
          }

          Add-Content -Path $env:GITHUB_ENV -Value "SUCCESS_RATE=$SUCCESS_RATE"
          Add-Content -Path $env:GITHUB_ENV -Value "STATUS_LEVEL=$STATUS_LEVEL"
          Add-Content -Path $env:GITHUB_ENV -Value "STATUS_COLOR=$STATUS_COLOR"

      # 🔥 ÚNICO TRECHO ALTERADO (CORRIGIDO)
      - name: Listar testes que falharam
        shell: powershell
        run: |
          $failList = @()

          $files = Get-ChildItem -Path "all-reports" -Recurse -Filter mochawesome*.json -ErrorAction SilentlyContinue

          foreach ($file in $files) {
            $json = Get-Content $file.FullName -Raw -Encoding UTF8 | ConvertFrom-Json

            if ($json.results) {
              foreach ($result in $json.results) {
                foreach ($suite in $result.suites) {
                  foreach ($test in $suite.tests) {

                    if ($test.fail -eq $true) {

                      $testName = $test.title

                      $errorMessage = if ($test.err -and $test.err.message) {
                        ($test.err.message -split "`n")[0]
                      } else {
                        "Erro não identificado"
                      }

                      $errorMessage = $errorMessage -replace "CypressError:\s*", ""

                      $failList += "<li style='margin-bottom:10px;'><b>$testName</b><br><span style='color:#dc3545;'> -> $errorMessage</span></li>"
                    }

                  }
                }
              }
            }
          }

          if ($failList.Count -eq 0) {
            $failText = "<p style='color:#28a745; font-weight:bold;'>Nenhum teste falhou</p>"
          } else {
            $failText = "<ul style='padding-left:20px; font-family:Arial;'>$($failList -join '')</ul>"
          }

          "FAIL_LIST<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $failText | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-html
          path: all-reports

      - name: Ajustar encoding UTF-8
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

      - name: Ignorar erro SSL
        shell: powershell
        run: |
          "NODE_TLS_REJECT_UNAUTHORIZED=0" >> $env:GITHUB_ENV

      - name: Enviar relatório por email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: correio.camed.com.br
          server_port: 587
          secure: false
          ignore_cert: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Testes dos Atendimentos Virtuais - Site Camed e Portal de Serviços"
          to: ${{ secrets.EMAIL_TO }}
          from: Jefferson Barbosa <${{ secrets.EMAIL_USER }}>

          convert_markdown: false
          html_body: |
            <meta charset="UTF-8">

            <div style="
            margin:0;
            padding:30px 0;
            background:#f4f6f8;
            font-family:Arial, Helvetica, sans-serif;
            ">

            <div style="
            max-width:820px;
            margin:0 auto;
            background:#ffffff;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 4px 18px rgba(0,0,0,0.08);
            ">

            <!-- HEADER -->
            <div style="
            background:linear-gradient(90deg,#0d6efd,#0b5ed7);
            color:#ffffff;
            padding:28px 32px;
            ">
            <h1 style="margin:0; font-size:26px; font-weight:700;">
            🚀 Execução dos testes automatizados concluída
            </h1>
            <p style="margin:8px 0 0 0; font-size:15px; opacity:0.95;">
            Relatório consolidado da execução automática da suíte de testes
            </p>
            </div>

            <!-- BODY -->
            <div style="padding:32px;">

            <p style="font-size:16px; color:#333; margin-top:0;">
            Olá,
            </p>

            <p style="font-size:15px; color:#555; line-height:1.6;">
            A execução automática dos testes referentes ao
            <b>Site Camed</b> e <b>Portal de Serviços – Área Logada</b>
            foi concluída com sucesso. Confira abaixo os principais indicadores
            do ciclo executado.
            </p>

            <!-- CARDS -->
            <table width="100%" cellpadding="8" cellspacing="0" style="margin-top:24px;">
            <tr>
            <td width="33%">
              <div style="
                background:#f8f9fa;
                border-radius:12px;
                padding:18px;
                text-align:center;
                border:1px solid #e9ecef;
              ">
                <div style="font-size:13px; color:#6c757d;">Total Executado</div>
                <div style="font-size:30px; font-weight:bold; color:#212529;">
                  ${{ env.TOTAL }}
                </div>
              </div>
            </td>

            <td width="33%">
              <div style="
                background:#f0fff4;
                border-radius:12px;
                padding:18px;
                text-align:center;
                border:1px solid #d4edda;
              ">
                <div style="font-size:13px; color:#6c757d;">Aprovados</div>
                <div style="font-size:30px; font-weight:bold; color:#28a745;">
                  ${{ env.PASSED }}
                </div>
              </div>
            </td>

            <td width="33%">
              <div style="
                background:#fff5f5;
                border-radius:12px;
                padding:18px;
                text-align:center;
                border:1px solid #f5c6cb;
              ">
                <div style="font-size:13px; color:#6c757d;">Falhas</div>
                <div style="font-size:30px; font-weight:bold; color:#dc3545;">
                  ${{ env.FAILED }}
                </div>
              </div>
            </td>
            </tr>
            </table>

            <!-- TAXA -->
            <div style="
            margin-top:24px;
            padding:18px;
            background:#f8f9fa;
            border-radius:12px;
            text-align:center;
            ">
            <span style="font-size:15px; color:#555;">Taxa de sucesso</span><br>
            <span style="font-size:34px; font-weight:bold; color:#28a745;">
            ${{ env.SUCCESS_RATE }}%
            </span>
            </div>

            <!-- STATUS -->
            <div style="
            margin-top:24px;
            padding:16px;
            border-radius:12px;
            text-align:center;
            font-weight:bold;
            color:#ffffff;
            background-color:${{
            env.FAILED == '0' && '#28a745' ||
            env.FAILED <= '2' && '#ffc107' ||
            '#dc3545'
            }};
            ">
            ${{ env.STATUS_LEVEL }}
            </div>

            <!-- FALHAS -->
            <div style="margin-top:28px;">

            ${{ env.FAILED == '0' && '
            <div style="
            background:#f0fff4;
            border-left:5px solid #28a745;
            padding:18px;
            border-radius:10px;
            ">
            <h3 style="margin:0; color:#28a745;">✅ Nenhuma falha identificada</h3>
            <p style="margin:8px 0 0 0; color:#444;">
              Todos os cenários executados foram concluídos com sucesso.
            </p>
            </div>
            ' || '
            <div style="
            background:#fff8f8;
            border-left:5px solid #dc3545;
            padding:18px;
            border-radius:10px;
            ">
            <h3 style="margin:0; color:#dc3545;">❌ Falhas detectadas</h3>
            <p style="margin:8px 0 14px 0; color:#555;">
              Os seguintes cenários apresentaram inconsistências durante a execução:
            </p>
            <div style="font-size:14px; color:#333;">
              ' }}${{ env.FAIL_LIST }}${{ env.FAILED == '0' && '' || '</div></div>' }}

            </div>

            <!-- RODAPÉ -->
            <div style="
            margin-top:32px;
            padding-top:20px;
            border-top:1px solid #e9ecef;
            ">
            <p style="font-size:14px; color:#6c757d; margin-bottom:18px;">
            Este relatório foi gerado automaticamente pelo pipeline de testes.
            </p>

            <div style="margin-top:18px;">
            <img src="https://raw.githubusercontent.com/jeffsbarbosa/automacao-sitecamed-portalbeneficiario/refs/heads/main/cypress/assets/assinatura_email1.png"
              alt="Assinatura Jefferson Barbosa"
              style="max-width:380px; width:100%;">
            </div>
            </div>

            </div>
            </div>
            </div>
