name: Testes Automatizados - Site Camed e Portal de Serviços Área Logada

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: self-hosted

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Testar acesso ao site
        shell: powershell
        run: |
          try {
            Invoke-WebRequest https://apps.camed.com.br/CamedSaudeServicos -UseBasicParsing
          } catch {
            Write-Host "Falha no acesso ao site"
          }

      - name: Rodar testes Cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          spec: cypress/e2e/TESTES_PERFIL_ASSOCIADO/TESTES_DISPONIBILIDADE_USABILIDADE/MENU_MEU_PLANO/DISPONIBILIDADE_ITENS.cy.js
          wait-on: ""

      # 🔥 GERA HTML DIRETO (SEM MERGE)
      - name: Gerar relatório HTML
        if: always()
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "cypress/reports" -Filter "*.json" | Select-Object -ExpandProperty FullName

          if (-not $files -or $files.Count -eq 0) {
          Write-Error "Nenhum arquivo JSON encontrado em cypress/reports!"
          exit 1
          }

          Write-Host "Arquivos encontrados:"
          $files

          npx marge $files --reportDir cypress/reports --reportFilename report

      - name: Upload dos relatórios (HTML + evidências)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cypress
          path: |
            cypress/reports
            cypress/screenshots
            cypress/videos

  gerar-relatorio-final:
    needs: cypress-run
    if: always()
    runs-on: self-hosted

    env:
      TOTAL: 0
      PASSED: 0
      FAILED: 0
      SUCCESS_RATE: 0
      STATUS_LEVEL: ""
      FAIL_LIST: ""

    steps:
      - name: Baixar relatórios do Cypress
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      # 🔥 AGORA USA DIRETO OS JSONS (SEM MERGE)
      - name: Consolidar resultados
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "all-reports" -Recurse -Filter mochawesome*.json

          [int]$TOTAL = 0
          [int]$PASSED = 0
          [int]$FAILED = 0

          foreach ($file in $files) {
          $json = Get-Content $file.FullName -Raw | ConvertFrom-Json

          if ($json.stats) {
          $TOTAL += [int]$json.stats.tests
          $PASSED += [int]$json.stats.passes
          $FAILED += [int]$json.stats.failures
          }
          }

          echo "TOTAL=$TOTAL" >> $env:GITHUB_ENV
          echo "PASSED=$PASSED" >> $env:GITHUB_ENV
          echo "FAILED=$FAILED" >> $env:GITHUB_ENV

      - name: Calcular métricas
        shell: powershell
        run: |
          if ($env:TOTAL -eq 0) {
            $SUCCESS_RATE = 0
          } else {
            $SUCCESS_RATE = [math]::Round(($env:PASSED / $env:TOTAL) * 100, 2)
          }

          if ($env:FAILED -eq 0) {
            $STATUS_LEVEL = "SUCESSO: Todos os fluxos dos atendimentos virtuais foram testados e nenhuma falha operacional foi detectada"
          }
          elseif ($env:FAILED -le 2) {
            $STATUS_LEVEL = "ATENÇÃO: Foram identificadas falhas pontuais nos testes."
          }
          else {
            $STATUS_LEVEL = "CRÍTICO: Foram identificadas falhas que impactam funcionalidades."
          }

          echo "SUCCESS_RATE=$SUCCESS_RATE" >> $env:GITHUB_ENV
          echo "STATUS_LEVEL=$STATUS_LEVEL" >> $env:GITHUB_ENV

      - name: Listar testes que falharam
        shell: powershell
        run: |
         $failList = @()

         $files = Get-ChildItem -Path "all-reports" -Recurse -Filter mochawesome*.json

         foreach ($file in $files) {
         $json = Get-Content $file.FullName | ConvertFrom-Json

          foreach ($result in $json.results) {
          foreach ($suite in $result.suites) {
          foreach ($test in $suite.tests) {
            if ($test.fail -eq $true) {
              $errorMessage = if ($test.err) { $test.err.message } else { "Erro não identificado" }
              $failList += "$($test.fullTitle)`n➡️ Erro: $errorMessage`n"
            }
          }
         }
         }
         }

         if ($failList.Count -eq 0) {
         $failList = "Nenhum teste falhou"
         }

         $failText = $failList -join "`n"

         echo "FAIL_LIST<<EOF" >> $env:GITHUB_ENV
         echo "$failText" >> $env:GITHUB_ENV
         echo "EOF" >> $env:GITHUB_ENV

      - name: Upload relatório HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-html
          path: all-reports

      - name: Ajustar encoding UTF-8
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

      - name: Enviar relatório por email
        uses: dawidd6/action-send-mail@v3
        with:
         server_address: smtp.gmail.com
         server_port: 465
         secure: true
         username: ${{ secrets.EMAIL_USER }}
         password: ${{ secrets.EMAIL_PASS }}
         subject: "Testes dos Atendimentos Virtuais - Site Camed e Portal de Serviços"
         to: ${{ secrets.EMAIL_TO }}
         from: ${{ secrets.EMAIL_USER }}

         convert_markdown: false
         html_body: |
          <h2>🚀 Execução dos testes automatizados concluída</h2>

          <p>Olá, bom dia! </p> 
          
          <p>Os testes automatizados do <b>Site Camed</b> e <b>Portal de Serviços Área Logada</b> foram executados. Segue abaixo, resumo da execução:</p>

          <h3>📊 Resumo da execução</h3>

          <table style="
          width: 100%;
          border-collapse: collapse;
          text-align: center;
          margin-top: 10px;
          font-family: Arial, sans-serif;
          ">

          <tr style="background-color: #f1f1f1;">
          <th style="padding: 10px; border: 1px solid #ddd;">Total</th>
          <th style="padding: 10px; border: 1px solid #ddd;">Aprovados</th>
          <th style="padding: 10px; border: 1px solid #ddd;">Falhas</th>
          </tr>

           <tr>
           <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">
           ${{ env.TOTAL }}
          </td>

          <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; color: #28a745;">
           ${{ env.PASSED }}
          </td>

          <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; color: #dc3545;">
           ${{ env.FAILED }}
          </td>
          </tr>

          </table>

          <p style="font-size: 16px;">
          <b>📈 Taxa de sucesso:</b> 
          <span style="color:#28a745; font-weight:bold;">${{ env.SUCCESS_RATE }}%</span>
          </p>

          <div style="
          padding: 12px;
          border-radius: 6px;
          margin-top: 10px;
          font-weight: bold;
          color: white;
          background-color: ${{
          env.FAILED == '0' && '#28a745' ||
          env.FAILED <= '2' && '#ffc107' ||
          '#dc3545'
          }};
          ">
          ${{ env.STATUS_LEVEL }}
          </div>

          <hr>

          ${{ env.FAILED == '0' && '
          <h3 style="color: #28a745;">✅ Nenhuma falha identificada</h3>
          ' || '
          <h3 style="color: #dc3545;">❌ TESTES COM FALHA:</h3>

          <div style="
          background: #fff5f5;
          border: 1px solid #f5c6cb;
          padding: 10px;
          border-radius: 6px;
          font-family: Arial, sans-serif;
          white-space: pre-line;
          ">
          ' }}${{ env.FAIL_LIST }}${{ env.FAILED == '0' && '' || '</div>' }}

          <hr>

          <br>
   

          <p>🤖 Automação de Testes</p>

          <p>
          —<br>
          Jefferson Barbosa<br>
          Analista de Qualidade
          </p>

         attachments: |
          all-reports/report.html
 