name: Relatório Semanal - Cypress

on:
  schedule:
    - cron: "0 12 * * 0"  # Domingo 12:00 UTC
  workflow_dispatch:

jobs:
  relatorio-semanal:
    runs-on: self-hosted

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar histórico
        shell: powershell
        run: |
          Write-Host "Arquivos encontrados em historico:"
          Get-ChildItem historico -Filter *.json

      - name: Ler históricos
        shell: powershell
        run: |
          $arquivos = Get-ChildItem historico -Filter *.json | Sort-Object Name

          foreach ($arquivo in $arquivos) {

            $json = Get-Content $arquivo.FullName -Raw | ConvertFrom-Json

            Write-Host "========================"
            Write-Host "Data........: $($json.data)"
            Write-Host "Total.......: $($json.total)"
            Write-Host "Sucesso.....: $($json.successRate)%"
            Write-Host "Falhas......: $($json.failed)"
            Write-Host "Homepage....: $($json.homepage)%"
            Write-Host "Portal......: $($json.portal)%"
            Write-Host "Perfil......: $($json.perfil)%"
          }
            
      - name: Ler último histórico
        shell: powershell
        run: |

          $ultimo = Get-ChildItem historico -Filter *.json |
                    Sort-Object Name |
                    Select-Object -Last 1

          if ($null -eq $ultimo) {
            Write-Host "Nenhum histórico encontrado."
            exit 0
          }

          Write-Host "Arquivo encontrado:"
          Write-Host $ultimo.Name

          Write-Host ""

          Write-Host "Conteúdo:"

          Get-Content $ultimo.FullName

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p cypress/reports

      - name: Upload relatório semanal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-semanal
          path: |
            cypress/reports
            cypress/screenshots
            cypress/videos