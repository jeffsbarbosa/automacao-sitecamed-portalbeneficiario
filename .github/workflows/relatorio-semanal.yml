name: Relatório Semanal

on:
  schedule:
    - cron: "0 12 * * 0"

  workflow_dispatch:

jobs:
  validar:
    runs-on: self-hosted

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Executar Testes Automatizados
        run: npm run cy:run