<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard QA - Camed</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        header{
            background:#003366;
            color:white;
            padding:20px;
            text-align:center;
        }

        main{
            padding:40px;
        }

        .card{
            background:white;
            border-radius:10px;
            padding:30px;
            box-shadow:0 2px 10px rgba(0,0,0,.10);
            max-width:600px;
            margin:auto;
        }

        h1{
            margin:0;
        }

        h2{
            margin-top:0;
            color:#003366;
        }

        p{
            font-size:18px;
            margin:15px 0;
        }

       .cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:30px;
}

@media (max-width:1200px){

    .cards{
        grid-template-columns:repeat(2,1fr);
    }

}

@media (max-width:700px){

    .cards{
        grid-template-columns:1fr;
    }

}

.card{
    background:#ffffff;
    border-radius:14px;
    padding:25px;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{

    transform:translateY(-4px);

    box-shadow:0 12px 28px rgba(0,0,0,.15);

}

.card h3{
    margin:0;
    color:#003366;
    font-size:18px;
}

.valor{
    margin-top:15px;
    font-size:42px;
    font-weight:bold;
    
}

.azul{
    color:#1565c0;
}

.verde{
    color:#2e7d32;
}

.vermelho{
    color:#c62828;
}

.roxo{
    color:#6a1b9a;
}

.atualizacao{

    margin-top:15px;

    font-size:14px;

    opacity:.9;

    letter-spacing:.3px;

}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

    <h1>Dashboard de Qualidade</h1>

    <p>Relatório Semanal Site Camed & Portal de Serviços</p>

    <div class="atualizacao">

        Última atualização:
        <span id="ultimaAtualizacao">-</span>

    </div>

</header>

<main>

<div class="cards">

    <div class="card">
        <h3>📊 Cenários</h3>
        <div id="cenarios" class="valor azul">-</div>
    </div>

    <div class="card">
        <h3>✅ Aprovados</h3>
        <div id="aprovados" class="valor verde">-</div>
    </div>

    <div class="card">
        <h3>❌ Falhas</h3>
        <div id="falhas" class="valor vermelho">-</div>
    </div>

    <div class="card">
        <h3>📈 Taxa de Sucesso</h3>
        <div id="sucesso" class="valor roxo">-%</div>
    </div>

</div>

<div class="card" style="margin-top:30px;">

    <h2>📈 Evolução da Taxa de Sucesso</h2>

    <canvas id="graficoSucesso"></canvas>

</div>

</main>

<script>

fetch("../historico/dashboard.json")
    .then(response => response.json())
    .then(dados => {

        console.log("Dashboard carregado:");
        console.log(dados);

        document.getElementById("cenarios").textContent =
            dados.resumo.cenarios;

        document.getElementById("aprovados").textContent =
            dados.resumo.aprovados;

        document.getElementById("falhas").textContent =
            dados.resumo.falhas;

        document.getElementById("sucesso").textContent =
            dados.resumo.sucesso;


const ultimo = dados.historico[dados.historico.length - 1];

const partes = ultimo.data.split("-");

const dataFormatada =
    `${partes[2]}/${partes[1]}/${partes[0]}`;

const horaFormatada = ultimo.hora.substring(0,5);

document.getElementById("ultimaAtualizacao").textContent =
    `${dataFormatada} às ${horaFormatada}`;

            const labels = dados.historico.map(item => item.data);

const valores = dados.historico.map(item => item.successRate);

const ctx = document
    .getElementById("graficoSucesso")
    .getContext("2d");

new Chart(ctx, {

    type: "line",

    data: {

        labels: labels,

        datasets: [{

            label: "Taxa de Sucesso (%)",

            data: valores,

            borderColor: "#1565c0",

            backgroundColor: "rgba(21,101,192,0.15)",

            borderWidth: 3,

            fill: true,

            tension: 0.3

        }]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                display: true

            }

        },

        scales: {

            y: {

                min: 1,

                max: 100

            }

        }

    }

});

    })
    .catch(erro => {

        console.error("Erro ao carregar dashboard:", erro);

    });

</script>

</body>

</html>
